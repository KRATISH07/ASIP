version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: asip_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asip_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asip_password}
      POSTGRES_DB: ${POSTGRES_DB:-asip_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asip_user} -d ${POSTGRES_DB:-asip_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: asip_chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asip_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-asip_user}:${POSTGRES_PASSWORD:-asip_password}@postgres:5432/${POSTGRES_DB:-asip_db}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: asip_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
